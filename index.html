<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inline and Block elements </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p>Hey I'm a Para </p>
 <a href="https://www.google.com">Google</a> 
 <!  since you have noticed that para line is all background width, but anchor tag background color is only for the text.   this is because paragraph is a block element and anchor is an inline element -->
 <div> I'm a Block Element </div><a href="#">I'm an inline anchor</a>
 <span>I'm span and i'm inline </span><a href="#">I'm an inline anchor</a> 
</body>
</html>
